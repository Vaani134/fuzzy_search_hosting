<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% block title %}Fuzzy Search{% endblock %}</title>

  <!-- Bootstrap 5 -->
  <link rel="stylesheet"
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
        integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH"
        crossorigin="anonymous" />

  <!-- Bootstrap Icons -->
  <link rel="stylesheet"
        href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" />

  <style>
    :root {
      --brand-primary: #2563eb;
      --brand-dark:    #1e40af;
    }

    body { background: #f8fafc; }

    /* ── Navbar ── */
    .navbar-brand { font-weight: 700; letter-spacing: -0.5px; }

    /* ── Search bar ── */
    .search-wrapper { max-width: 680px; margin: 0 auto; }
    .search-input   { border-radius: 2rem 0 0 2rem !important; font-size: 1.1rem; padding: .65rem 1.2rem; }
    .search-btn     { border-radius: 0 2rem 2rem 0 !important; padding: .65rem 1.4rem; }

    /* ── Score badges ── */
    .badge-high   { background: #16a34a; color: #fff; }
    .badge-medium { background: #2563eb; color: #fff; }
    .badge-low    { background: #d97706; color: #fff; }

    /* ── Product card ── */
    .product-card {
      transition: box-shadow .15s ease, transform .15s ease;
      border: 1px solid #e2e8f0;
    }
    .product-card:hover {
      box-shadow: 0 8px 24px rgba(0,0,0,.10);
      transform: translateY(-2px);
    }
    .product-img {
      width: 100%;
      height: 180px;
      object-fit: contain;
      background: #f1f5f9;
      border-radius: .375rem .375rem 0 0;
      padding: .5rem;
    }
    .product-img-placeholder {
      width: 100%;
      height: 180px;
      background: #f1f5f9;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: .375rem .375rem 0 0;
      color: #94a3b8;
      font-size: 3rem;
    }

    /* ── Score bar ── */
    .score-bar-track {
      height: 6px;
      background: #e2e8f0;
      border-radius: 3px;
      overflow: hidden;
    }
    .score-bar-fill {
      height: 100%;
      border-radius: 3px;
      transition: width .4s ease;
    }
    .score-bar-fill.high   { background: #16a34a; }
    .score-bar-fill.medium { background: #2563eb; }
    .score-bar-fill.low    { background: #d97706; }

    /* ── Misc ── */
    .stat-pill {
      background: #e0e7ff;
      color: #3730a3;
      border-radius: 999px;
      padding: .2rem .75rem;
      font-size: .8rem;
      font-weight: 600;
    }
    footer { font-size: .8rem; color: #94a3b8; }

    /* ── Download Cart (floating) ── */
    #download-cart {
      position: fixed;
      bottom: 1.5rem;
      right: 1.5rem;
      width: 320px;
      z-index: 1050;
      border-radius: .75rem;
      box-shadow: 0 8px 32px rgba(0,0,0,.18);
      display: none;
      flex-direction: column;
      max-height: 480px;
      background: #fff;
      border: 1px solid #e2e8f0;
      overflow: hidden;
    }
    #download-cart.visible { display: flex; }
    #download-cart .cart-header {
      background: #1e40af;
      color: #fff;
      padding: .65rem 1rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-shrink: 0;
    }
    #download-cart .cart-body {
      overflow-y: auto;
      flex: 1;
      padding: .5rem;
    }
    #download-cart .cart-item {
      display: flex;
      align-items: center;
      gap: .5rem;
      padding: .35rem .5rem;
      border-radius: .375rem;
      font-size: .8rem;
    }
    #download-cart .cart-item:hover { background: #f1f5f9; }
    #download-cart .cart-item img {
      width: 36px; height: 36px;
      object-fit: contain;
      border-radius: .25rem;
      background: #f8fafc;
      flex-shrink: 0;
    }
    #download-cart .cart-item .item-name {
      flex: 1;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    #download-cart .cart-footer {
      padding: .65rem;
      border-top: 1px solid #e2e8f0;
      flex-shrink: 0;
    }

    /* ── Cart toggle bubble ── */
    #cart-bubble {
      position: fixed;
      bottom: 1.5rem;
      right: 1.5rem;
      width: 56px; height: 56px;
      border-radius: 50%;
      background: #2563eb;
      color: #fff;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.4rem;
      cursor: pointer;
      box-shadow: 0 4px 16px rgba(37,99,235,.4);
      z-index: 1049;
      transition: transform .15s ease;
    }
    #cart-bubble:hover { transform: scale(1.08); }
    #cart-bubble .cart-count {
      position: absolute;
      top: -4px; right: -4px;
      background: #dc2626;
      color: #fff;
      border-radius: 999px;
      font-size: .65rem;
      font-weight: 700;
      min-width: 18px; height: 18px;
      display: flex; align-items: center; justify-content: center;
      padding: 0 4px;
    }

    /* ── Card checkbox overlay ── */
    .card-select-overlay {
      position: absolute;
      top: .5rem; left: .5rem;
      z-index: 10;
    }
    .card-select-overlay input[type=checkbox] {
      width: 20px; height: 20px;
      cursor: pointer;
      accent-color: #2563eb;
    }
    .product-card.selected {
      outline: 2px solid #2563eb;
      outline-offset: 2px;
    }

    /* ── Autocomplete dropdown ── */
    #autocomplete-dropdown {
      position: absolute;
      top: 100%;
      left: 0; right: 0;
      background: #fff;
      border: 1px solid #e2e8f0;
      border-top: none;
      border-radius: 0 0 .75rem .75rem;
      box-shadow: 0 8px 24px rgba(0,0,0,.10);
      z-index: 1000;
      max-height: 320px;
      overflow-y: auto;
      display: none;
    }
    #autocomplete-dropdown.open { display: block; }
    .ac-item {
      padding: .5rem 1rem;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: .6rem;
      font-size: .9rem;
    }
    .ac-item:hover, .ac-item.active { background: #eff6ff; }
    .ac-item mark { background: #fef08a; padding: 0; border-radius: 2px; }
    .ac-type-badge {
      font-size: .65rem;
      padding: .1rem .4rem;
      border-radius: 999px;
      flex-shrink: 0;
    }
    .ac-type-product  { background: #dbeafe; color: #1d4ed8; }
    .ac-type-brand    { background: #fef9c3; color: #854d0e; }
    .ac-type-category { background: #dcfce7; color: #166534; }
  </style>

  {% block extra_head %}{% endblock %}
</head>
<body>

<!-- ── Navbar ── -->
<nav class="navbar navbar-expand-lg navbar-dark" style="background: var(--brand-primary);">
  <div class="container">
    <a class="navbar-brand" href="/">
      <i class="bi bi-search me-2"></i>FuzzySearch
    </a>
    <div class="d-flex gap-3 ms-auto">
      <a href="/"       class="nav-link text-white {% if request.path == '/' %}fw-bold{% endif %}">
        <i class="bi bi-speedometer2 me-1"></i>Dashboard
      </a>
      <a href="/search" class="nav-link text-white {% if request.path == '/search' %}fw-bold{% endif %}">
        <i class="bi bi-search me-1"></i>Search
      </a>
      <a href="/sync"   class="nav-link text-white {% if request.path == '/sync' %}fw-bold{% endif %}">
        <i class="bi bi-arrow-repeat me-1"></i>Sync
      </a>
      <a href="/settings" class="nav-link text-white {% if request.path == '/settings' %}fw-bold{% endif %}">
        <i class="bi bi-gear me-1"></i>Settings
      </a>
      <a href="/api/stats" target="_blank" class="nav-link text-white">
        <i class="bi bi-bar-chart me-1"></i>Stats
      </a>
    </div>
  </div>
</nav>

<!-- ── Main content ── -->
<main class="container py-4">
  {% block content %}{% endblock %}
</main>

<!-- ── Footer ── -->
<footer class="text-center py-3">
  Fuzzy Search Engine &mdash; RapidFuzz &bull; Flask &bull; SQLite
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-YvpcrYf0tY3lHB60NNkmXc4s9bIOgUxi8T/jzmFXFMrWCU3FA0e6bKIHFORSFt6"
        crossorigin="anonymous"></script>

<!-- ── Download Cart Widget ── -->
<div id="cart-bubble" onclick="CartManager.toggle()" title="Download Cart">
  <i class="bi bi-download"></i>
  <span class="cart-count" id="cart-count" style="display:none;">0</span>
</div>

<div id="download-cart">
  <div class="cart-header">
    <span><i class="bi bi-download me-2"></i>Download Cart</span>
    <div class="d-flex gap-2 align-items-center">
      <button class="btn btn-sm btn-outline-light py-0" onclick="CartManager.clearAll()" title="Clear all">
        <i class="bi bi-trash"></i>
      </button>
      <button class="btn btn-sm btn-outline-light py-0" onclick="CartManager.toggle()" title="Close">
        <i class="bi bi-x-lg"></i>
      </button>
    </div>
  </div>
  <div class="cart-body" id="cart-items-list">
    <p class="text-muted text-center small py-3">No items selected.</p>
  </div>
  <div class="cart-footer">
    <div class="d-flex justify-content-between align-items-center mb-2">
      <small class="text-muted"><span id="cart-total">0</span> image(s) selected</small>
    </div>
    <!-- Single item: one Download Image button -->
    <div id="cart-btn-single" style="display:none;">
      <button class="btn btn-primary w-100" onclick="CartManager.downloadDirect()" disabled id="btn-dl-single">
        <i class="bi bi-download me-1"></i>Download Image
      </button>
    </div>
    <!-- Multiple items: two options -->
    <div id="cart-btn-multi" style="display:none;">
      <div class="d-grid gap-2">
        <button class="btn btn-primary" onclick="CartManager.downloadZip()" id="btn-dl-zip">
          <i class="bi bi-file-zip me-1"></i>Download as ZIP
        </button>
        <button class="btn btn-outline-primary" onclick="CartManager.downloadImages()" id="btn-dl-individual">
          <i class="bi bi-images me-1"></i>Download Individually
        </button>
      </div>
    </div>
  </div>
</div>

<!-- ── Global Cart + Autocomplete JS ── -->
<script>
// ═══════════════════════════════════════════════════════════════
// CART MANAGER
// Stores selected products in localStorage for persistence
// across page navigations.
// ═══════════════════════════════════════════════════════════════
const CartManager = (() => {
  const STORAGE_KEY = "fuzzy_download_cart";

  function load() {
    try { return JSON.parse(localStorage.getItem(STORAGE_KEY) || "{}"); }
    catch { return {}; }
  }

  function save(cart) {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(cart));
  }

  function add(id, name, imgUrl) {
    const cart = load();
    if (!cart[id]) {
      cart[id] = { id, name, imgUrl };
      save(cart);
    }
    refresh();
  }

  function remove(id) {
    const cart = load();
    delete cart[id];
    save(cart);
    refresh();
  }

  function clearAll() {
    save({});
    refresh();
    // Uncheck all checkboxes on current page
    document.querySelectorAll(".product-select-cb").forEach(cb => {
      cb.checked = false;
      cb.closest(".product-card")?.classList.remove("selected");
    });
  }

  function has(id) {
    return !!load()[id];
  }

  function toggle() {
    const cart = document.getElementById("download-cart");
    const bubble = document.getElementById("cart-bubble");
    const isVisible = cart.classList.contains("visible");
    cart.classList.toggle("visible", !isVisible);
    bubble.style.display = isVisible ? "flex" : "none";
  }

  function refresh() {
    const cart = load();
    const items = Object.values(cart);
    const count = items.length;

    // Update bubble badge
    const badge = document.getElementById("cart-count");
    badge.textContent = count;
    badge.style.display = count > 0 ? "flex" : "none";

    // Update total label
    document.getElementById("cart-total").textContent = count;

    // Enable/disable download buttons based on count
    const single = document.getElementById("cart-btn-single");
    const multi  = document.getElementById("cart-btn-multi");
    const btnS   = document.getElementById("btn-dl-single");

    if (single && multi) {
      if (count === 0) {
        single.style.display = "none";
        multi.style.display  = "none";
      } else if (count === 1) {
        single.style.display = "block";
        multi.style.display  = "none";
        if (btnS) btnS.disabled = false;
      } else {
        single.style.display = "none";
        multi.style.display  = "block";
      }
    }

    // Render cart items
    const list = document.getElementById("cart-items-list");
    if (!list) return;

    if (count === 0) {
      list.innerHTML = '<p class="text-muted text-center small py-3">No items selected.</p>';
      return;
    }

    list.innerHTML = items.map(item => `
      <div class="cart-item" id="cart-item-${item.id}">
        <img src="${item.imgUrl || ''}"
             onerror="this.src=''"
             alt="${escHtml(item.name)}" />
        <span class="item-name" title="${escHtml(item.name)}">${escHtml(item.name)}</span>
        <button class="btn btn-sm btn-link text-danger p-0 ms-auto"
                onclick="CartManager.remove(${item.id})" title="Remove">
          <i class="bi bi-x"></i>
        </button>
      </div>
    `).join("");

    // Sync checkboxes on current page
    document.querySelectorAll(".product-select-cb").forEach(cb => {
      const pid = parseInt(cb.dataset.productId);
      cb.checked = !!cart[pid];
      cb.closest(".product-card")?.classList.toggle("selected", !!cart[pid]);
    });
  }

  // ── Shared: trigger a blob download in the browser ──────────────────────
  function triggerDownload(blob, filename) {
    const url = URL.createObjectURL(blob);
    const a   = document.createElement("a");
    a.href     = url;
    a.download = filename;
    document.body.appendChild(a);
    a.click();
    a.remove();
    URL.revokeObjectURL(url);
  }

  // ── Shared: call backend and get a blob ───────────────────────────────────
  async function fetchDownload(ids) {
    const resp = await fetch("/api/download-zip", {
      method:  "POST",
      headers: { "Content-Type": "application/json" },
      body:    JSON.stringify({ product_ids: ids }),
    });
    if (!resp.ok) {
      const err = await resp.json().catch(() => ({}));
      throw new Error(err.error || resp.statusText);
    }
    const blob = await resp.blob();
    // Read filename from Content-Disposition if available
    const cd    = resp.headers.get("Content-Disposition") || "";
    const match = cd.match(/filename[^;=\n]*=["']?([^"';\n]+)/i);
    const name  = match ? match[1].trim() : null;
    return { blob, name };
  }

  // ── Single image direct download ──────────────────────────────────────────
  async function downloadDirect() {
    const cart = load();
    const ids  = Object.keys(cart).map(Number);
    if (ids.length !== 1) return;

    const btn = document.getElementById("btn-dl-single");
    const orig = btn.innerHTML;
    btn.disabled  = true;
    btn.innerHTML = '<span class="spinner-border spinner-border-sm me-1"></span>Downloading…';

    try {
      const { blob, name } = await fetchDownload(ids);
      triggerDownload(blob, name || `product_image_${Date.now()}.jpg`);
    } catch (e) {
      alert("Download failed: " + e.message);
    } finally {
      btn.innerHTML = orig;
      btn.disabled  = false;
    }
  }

  // ── Multiple → ZIP ────────────────────────────────────────────────────────
  async function downloadZip() {
    const cart = load();
    const ids  = Object.keys(cart).map(Number);
    if (ids.length === 0) return;

    const btn  = document.getElementById("btn-dl-zip");
    const orig = btn.innerHTML;
    btn.disabled  = true;
    btn.innerHTML = '<span class="spinner-border spinner-border-sm me-1"></span>Building ZIP…';

    // Disable the other button too while working
    const btnI = document.getElementById("btn-dl-individual");
    if (btnI) btnI.disabled = true;

    try {
      const { blob, name } = await fetchDownload(ids);
      triggerDownload(blob, name || `product_images_${Date.now()}.zip`);
    } catch (e) {
      alert("Download failed: " + e.message);
    } finally {
      btn.innerHTML = orig;
      btn.disabled  = false;
      if (btnI) btnI.disabled = false;
    }
  }

  // ── Multiple → download each image individually (sequential) ─────────────
  async function downloadImages() {
    const cart  = load();
    const items = Object.values(cart);
    if (items.length === 0) return;

    const btn  = document.getElementById("btn-dl-individual");
    const orig = btn.innerHTML;
    const btnZ = document.getElementById("btn-dl-zip");
    btn.disabled  = true;
    if (btnZ) btnZ.disabled = true;

    let done = 0;

    for (const item of items) {
      btn.innerHTML =
        `<span class="spinner-border spinner-border-sm me-1"></span>` +
        `Downloading ${done + 1}/${items.length}…`;
      try {
        const { blob, name } = await fetchDownload([item.id]);
        triggerDownload(blob, name || `product_image_${item.id}_${Date.now()}.jpg`);
        done++;
        // Small delay so browser doesn't block multiple rapid downloads
        await new Promise(r => setTimeout(r, 400));
      } catch (e) {
        console.warn(`Skipped ${item.name}: ${e.message}`);
      }
    }

    btn.innerHTML = orig;
    btn.disabled  = false;
    if (btnZ) btnZ.disabled = false;
  }

  function escHtml(str) {
    return String(str)
      .replace(/&/g, "&amp;")
      .replace(/</g, "&lt;")
      .replace(/>/g, "&gt;")
      .replace(/"/g, "&quot;");
  }

  // Init on page load
  document.addEventListener("DOMContentLoaded", refresh);

  return { add, remove, clearAll, toggle, has, refresh, downloadZip, downloadDirect, downloadImages };
})();


// ═══════════════════════════════════════════════════════════════
// AUTOCOMPLETE
// Attaches to any input with id="searchInput"
// ═══════════════════════════════════════════════════════════════
document.addEventListener("DOMContentLoaded", () => {
  const input = document.getElementById("searchInput");
  if (!input) return;

  // Wrap input in a relative-positioned container for dropdown
  const wrapper = input.closest(".input-group");
  if (wrapper) wrapper.style.position = "relative";

  // Create dropdown element
  const dropdown = document.createElement("div");
  dropdown.id = "autocomplete-dropdown";
  if (wrapper) wrapper.appendChild(dropdown);

  let debounceTimer = null;
  let activeIndex   = -1;
  let currentItems  = [];

  function highlight(text, query) {
    if (!query) return escHtml(text);
    const re = new RegExp(`(${query.replace(/[.*+?^${}()|[\]\\]/g, "\\$&")})`, "gi");
    return escHtml(text).replace(re, "<mark>$1</mark>");
  }

  function escHtml(str) {
    return String(str)
      .replace(/&/g, "&amp;").replace(/</g, "&lt;")
      .replace(/>/g, "&gt;").replace(/"/g, "&quot;");
  }

  function typeLabel(type) {
    const map = {
      product:  ["ac-type-product",  "Product"],
      brand:    ["ac-type-brand",    "Brand"],
      category: ["ac-type-category", "Category"],
    };
    const [cls, label] = map[type] || ["bg-secondary text-white", type];
    return `<span class="ac-type-badge ${cls}">${label}</span>`;
  }

  function render(items, query) {
    currentItems = items;
    activeIndex  = -1;

    if (!items.length) {
      dropdown.classList.remove("open");
      return;
    }

    dropdown.innerHTML = items.map((item, i) => `
      <div class="ac-item" data-index="${i}" data-text="${escHtml(item.text)}">
        <i class="bi bi-search text-muted" style="font-size:.75rem;"></i>
        <span class="flex-1">${highlight(item.text, query)}</span>
        ${typeLabel(item.type)}
      </div>
    `).join("");

    dropdown.querySelectorAll(".ac-item").forEach(el => {
      el.addEventListener("mousedown", e => {
        e.preventDefault();
        selectItem(parseInt(el.dataset.index));
      });
    });

    dropdown.classList.add("open");
  }

  function selectItem(index) {
    const item = currentItems[index];
    if (!item) return;
    input.value = item.text;
    dropdown.classList.remove("open");
    input.closest("form")?.submit();
  }

  function setActive(index) {
    const els = dropdown.querySelectorAll(".ac-item");
    els.forEach(el => el.classList.remove("active"));
    if (index >= 0 && index < els.length) {
      els[index].classList.add("active");
      els[index].scrollIntoView({ block: "nearest" });
    }
    activeIndex = index;
  }

  async function fetchSuggestions(q) {
    if (q.length < 2) { dropdown.classList.remove("open"); return; }
    try {
      const resp  = await fetch(`/api/autocomplete?q=${encodeURIComponent(q)}&limit=10`);
      const items = await resp.json();
      render(items, q);
    } catch { dropdown.classList.remove("open"); }
  }

  input.addEventListener("input", () => {
    clearTimeout(debounceTimer);
    debounceTimer = setTimeout(() => fetchSuggestions(input.value.trim()), 180);
  });

  input.addEventListener("keydown", e => {
    const els = dropdown.querySelectorAll(".ac-item");
    if (!dropdown.classList.contains("open")) return;

    if (e.key === "ArrowDown") {
      e.preventDefault();
      setActive(Math.min(activeIndex + 1, els.length - 1));
    } else if (e.key === "ArrowUp") {
      e.preventDefault();
      setActive(Math.max(activeIndex - 1, -1));
    } else if (e.key === "Enter" && activeIndex >= 0) {
      e.preventDefault();
      selectItem(activeIndex);
    } else if (e.key === "Escape") {
      dropdown.classList.remove("open");
    }
  });

  document.addEventListener("click", e => {
    if (!dropdown.contains(e.target) && e.target !== input) {
      dropdown.classList.remove("open");
    }
  });
});
</script>

{% block extra_scripts %}{% endblock %}
</body>
</html>
